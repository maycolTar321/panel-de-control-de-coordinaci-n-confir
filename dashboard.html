<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Coordinación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; font-family: system-ui, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-item { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 14px !important; transition: all 0.25s ease; cursor: pointer; }
        .glass-item:hover { background: rgba(255, 255, 255, 0.08) !important; transform: translateY(-2px); }
        .glass-modal { background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="glass-card p-4 p-md-5">
        <h1 class="mb-4 text-white">Estado del Proyecto <span class="badge bg-primary fs-6">Coordinador</span></h1>
        <p class="text-white-50">Escribe las nuevas actividades para el equipo. Aparecerán aquí abajo como un checklist.</p>
        
        <!-- Formulario JS para agregar actividades -->
        <form id="formCrear" class="mb-4">
            <div class="input-group">
                <input type="text" id="tituloNueva" class="form-control bg-dark text-white border-secondary" placeholder="Escribe una nueva actividad..." required>
                <input type="date" id="fechaNueva" class="form-control bg-dark text-white border-secondary" required style="max-width: 150px;">
                <button class="btn btn-success fw-bold" type="submit" id="btnCrear">Añadir Tarea</button>
            </div>
        </form>

        <div class="list-group mt-4" id="listaActividades">
            <div class="text-center text-white-50">Cargando actividades desde Google Sheets...</div>
        </div>
    </div>
</div>

<div class="modal fade" id="detalleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content glass-modal text-white">
      <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <h5 class="modal-title" id="modalTitulo">Detalle de la Actividad</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalCuerpo">
        <div class="text-center"><div class="spinner-border text-light" role="status"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
    await cargarLista();

    document.getElementById("formCrear").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnCrear");
        btn.disabled = true;
        btn.innerText = "Guardando...";
        
        const res = await crearActividad(document.getElementById("tituloNueva").value, document.getElementById("fechaNueva").value);
        if(res.success) {
            document.getElementById("tituloNueva").value = "";
            await cargarLista();
        } else {
            alert("Error al guardar");
        }
        btn.disabled = false;
        btn.innerText = "Añadir Tarea";
    });
});

async function cargarLista() {
    const lista = document.getElementById("listaActividades");
    const actividades = await fetchActividades();
    lista.innerHTML = "";
    if(actividades.length === 0) {
        lista.innerHTML = '<div class="text-center text-white-50">No hay actividades. Añade una arriba.</div>';
        return;
    }
    
    actividades.forEach(act => {
        const isCompletado = act.estado === 'completado';
        const badgeColor = act.estado === 'pendiente' ? 'danger' : (act.estado === 'en_proceso' ? 'warning' : 'success');
        
        const div = document.createElement("div");
        div.className = "list-group-item list-group-item-action glass-item d-flex justify-content-between align-items-center text-white mb-2";
        div.onclick = () => verDetalle(act.id, act.titulo);
        
        div.innerHTML = `
            <div class="d-flex align-items-center">
                <input class="form-check-input me-3" type="checkbox" ${isCompletado ? 'checked' : ''} disabled>
                <span class="${isCompletado ? 'text-decoration-line-through text-white-50' : 'fw-bold'}">${act.titulo}</span>
            </div>
            <span class="badge rounded-pill bg-${badgeColor}">${act.estado.charAt(0).toUpperCase() + act.estado.slice(1)}</span>
        `;
        lista.appendChild(div);
    });
}

async function verDetalle(id, titulo) {
    document.getElementById('modalTitulo').innerText = titulo;
    document.getElementById('modalCuerpo').innerHTML = '<div class="text-center"><div class="spinner-border text-light" role="status"></div></div>';
    var myModal = new bootstrap.Modal(document.getElementById('detalleModal'));
    myModal.show();

    const detalles = await fetchDetalles(id);
    let html = "";
    if(detalles.length === 0) {
        html = "<p style='color:#a8b2d1;'>No hay reportes detallados registrados para esta actividad todavía.</p>";
    } else {
        detalles.forEach(row => {
            html += `<div style='background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #0d6efd;'>
            <small style='color: #a8b2d1;'>${row.fecha} - <strong>${row.usuario}</strong></small>
            <p style='margin-top: 8px; color: #fff; margin-bottom: 0;'>${row.detalle.replace(/\n/g, '<br>')}</p>
            </div>`;
        });
    }
    document.getElementById('modalCuerpo').innerHTML = html;
}
</script>
</body>
</html>
