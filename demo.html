<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo En Vivo - Sistema de Coordinación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; font-family: system-ui, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-item { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 14px !important; transition: all 0.25s ease; cursor: pointer; }
        .glass-item:hover { background: rgba(255, 255, 255, 0.08) !important; transform: translateY(-2px); }
        .glass-modal { background: rgba(15, 32, 39, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; }
        .item-bitacora { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #0d6efd; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="glass-card p-4 p-md-5 text-white">
        <h1 class="mb-2 fw-bold">Panel de Control <span class="badge bg-primary fs-6">Modo Demo</span></h1>
        <p class="text-white-50">Simulación del sistema. Haz clic sobre cualquier actividad del checklist para desplegar los motivos de retraso acumulados este mes.</p>
        
        <div class="list-group mt-4">
            <div class="list-group-item list-group-item-action glass-item d-flex justify-content-between align-items-center text-white mb-2" onclick="verDetalle('Reserva del Salón de Eventos', 1)">
                <div class="d-flex align-items-center">
                    <input class="form-check-input me-3" type="checkbox" disabled>
                    <span class="fw-bold">Reserva y Confirmación del Salón</span>
                </div>
                <span class="badge rounded-pill bg-danger">Pendiente</span>
            </div>

            <div class="list-group-item list-group-item-action glass-item d-flex justify-content-between align-items-center text-white mb-2" onclick="verDetalle('Aprobación de Presupuesto Mensual', 2)">
                <div class="d-flex align-items-center">
                    <input class="form-check-input me-3" type="checkbox" disabled>
                    <span class="fw-bold">Aprobación de Presupuesto Mensual</span>
                </div>
                <span class="badge rounded-pill bg-warning text-dark">En Proceso</span>
            </div>

            <div class="list-group-item list-group-item-action glass-item d-flex justify-content-between align-items-center text-white mb-2" onclick="verDetalle('Envío de Invitaciones Formales', 3)">
                <div class="d-flex align-items-center">
                    <input class="form-check-input me-3" type="checkbox" checked disabled>
                    <span class="text-decoration-line-through text-white-50">Envío de Invitaciones Formales</span>
                </div>
                <span class="badge rounded-pill bg-success">Completado</span>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detalleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content glass-modal text-white">
      <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
        <h5 class="modal-title" id="modalTitulo">Detalle</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="modalCuerpo">
        </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Datos simulados que normalmente vendrían de MySQL
const datosSimulados = {
    1: `<div class="item-bitacora">
            <small class="text-muted">Hace 2 días - <strong>Subcoordinadora</strong></small>
            <p class="mt-2 text-white">El dueño del local no se encontraba en la ciudad. Quedó en confirmar el precio final este viernes. No se pudo congelar la fecha por falta del anticipo de caja.</p>
        </div>
        <div class="item-bitacora" style="border-left-color: #dc3545;">
            <small class="text-muted">Hace 2 semanas - <strong>Secretaria</strong></small>
            <p class="mt-2 text-white">Se llamó por teléfono pero indicaron que los presupuestos cambiaron respecto al mes pasado. Exigen reunión presencial.</p>
        </div>`,
    2: `<div class="item-bitacora">
            <small class="text-muted">Ayer - <strong>Secretaria</strong></small>
            <p class="mt-2 text-white">Falta que el área contable libere los saldos correspondientes a las firmas del mes anterior. Ya se envió la solicitud formal.</p>
        </div>`,
    3: `<div class="item-bitacora" style="border-left-color: #29cc7a;">
            <small class="text-muted">Hace 4 días - <strong>Subcoordinadora</strong></small>
            <p class="mt-2 text-white">Todas las invitaciones digitales y físicas fueron entregadas con éxito. Lista de confirmación cerrada en el sistema.</p>
        </div>`
};

function verDetalle(titulo, id) {
    document.getElementById('modalTitulo').innerText = titulo;
    document.getElementById('modalCuerpo').innerHTML = datosSimulados[id];
    var myModal = new bootstrap.Modal(document.getElementById('detalleModal'));
    myModal.show();
}
</script>
</body>
</html>
